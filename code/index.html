<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            resize: vertical;
            min-height: 200px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .method-selector {
            margin: 20px 0;
        }

        .method-selector label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
            font-weight: 500;
        }

        .method-selector input[type="radio"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .results h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .result-hidden {
            display: none;
        }

        .probability-bar {
            height: 30px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
            position: relative;
        }

        .probability-fill {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: width 0.3s ease;
            background: linear-gradient(90deg, #4caf50, #ff9800, #f44336);
            background-size: 100% 100%;
        }

        .verdict {
            font-size: 1.3em;
            font-weight: bold;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            text-align: center;
        }

        .verdict.credible {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .verdict.questionable {
            background: #fff9c4;
            color: #f57f17;
        }

        .verdict.fake {
            background: #ffcdd2;
            color: #c62828;
        }

        .analysis-section {
            margin: 20px 0;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            padding: 15px;
            background: #f9f9f9;
        }

        .analysis-section h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .analysis-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .analysis-item:last-child {
            border-bottom: none;
        }

        .analysis-label {
            font-weight: 500;
            color: #333;
        }

        .analysis-value {
            color: #667eea;
            font-weight: bold;
        }

        .red-flags {
            margin: 15px 0;
        }

        .red-flag-item {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 10px;
            margin: 8px 0;
            border-radius: 3px;
            color: #c62828;
        }

        .error {
            background: #ffcdd2;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            border-left: 4px solid #f44336;
        }

        .success {
            background: #c8e6c9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            border-left: 4px solid #4caf50;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .comparison-grid {
                grid-template-columns: 1fr;
            }
        }

        .comparison-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #e0e0e0;
        }

        .comparison-item h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .score-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .score-comparison {
                grid-template-columns: 1fr;
            }
        }

        .score-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #667eea;
            text-align: center;
        }

        .score-card.keyword {
            border-color: #4caf50;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
        }

        .score-card.llm {
            border-color: #2196f3;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        }

        .score-card.combined {
            border-color: #ff9800;
            background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
        }

        .score-card h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .score-card.keyword .score-value {
            color: #2e7d32;
        }

        .score-card.llm .score-value {
            color: #1565c0;
        }

        .score-card.combined .score-value {
            color: #e65100;
        }

        .score-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }

        .weight-indicator {
            font-size: 0.85em;
            color: #999;
            margin-top: 8px;
            font-style: italic;
        }

        .detailed-comparison {
            margin-top: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
        }

        .comparison-table th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            color: #667eea;
            border-bottom: 2px solid #e0e0e0;
        }

        .comparison-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .comparison-table tr:last-child td {
            border-bottom: none;
        }

        .comparison-table tr:nth-child(even) {
            background: #f9f9f9;
        }

        .metric-name {
            font-weight: 500;
            color: #333;
        }

        .metric-keyword {
            text-align: center;
            color: #2e7d32;
        }

        .metric-llm {
            text-align: center;
            color: #1565c0;
        }

        .calculation-breakdown {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            border-left: 4px solid #667eea;
        }

        .calculation-breakdown h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .calculation-step {
            margin: 8px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            opacity: 0.8;
        }

        .api-status {
            background: white;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .status-badge.online {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .status-badge.offline {
            background: #ffcdd2;
            color: #c62828;
        }

        .clear-btn {
            background: #9e9e9e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .clear-btn:hover {
            background: #757575;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Fake News Detector</h1>
            <p>Analyze articles for misinformation using AI-powered detection</p>
        </header>

        <div class="api-status">
            API Status: <span class="status-badge offline" id="apiStatus">Checking...</span>
        </div>

        <div class="main-content">
            <!-- Input Section -->
            <div class="card">
                <h2>📝 Article Analysis</h2>
                
                <textarea id="articleText" placeholder="Paste your article text here..."></textarea>

                <div class="method-selector">
                    <label>
                        <input type="radio" name="method" value="keyword" checked>
                        🔑 Keyword-Based Detection (Fast, No Dependencies)
                    </label>
                    <label>
                        <input type="radio" name="method" value="llm">
                        🤖 LLM-Based Detection (Accurate, Requires Ollama)
                    </label>
                    <label>
                        <input type="radio" name="method" value="hybrid">
                        ⚡ Hybrid Detection (Best of Both)
                    </label>
                </div>

                <button class="submit-btn" id="analyzeBtn" onclick="analyzeArticle()">Analyze Article</button>
                <button class="clear-btn" onclick="clearInput()">Clear</button>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    Analyzing... Please wait.
                </div>
            </div>

            <!-- Results Section -->
            <div class="card">
                <h2>📊 Analysis Results</h2>
                <div id="results" class="result-hidden">
                    <!-- Results will be populated here -->
                </div>
                <div id="resultsPlaceholder" style="color: #999; text-align: center; padding: 40px 0;">
                    Results will appear here...
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Fake News Detection System | Powered by Keyword Analysis & Local LLM</p>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';

        // =====================================================================
        // Utility Functions
        // =====================================================================

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function disableAnalyzeBtn(disabled) {
            document.getElementById('analyzeBtn').disabled = disabled;
        }

        function clearInput() {
            document.getElementById('articleText').value = '';
            document.getElementById('results').innerHTML = '';
            document.getElementById('results').classList.add('result-hidden');
            document.getElementById('resultsPlaceholder').style.display = 'block';
        }

        function getSelectedMethod() {
            return document.querySelector('input[name="method"]:checked').value;
        }

        // =====================================================================
        // API Communication
        // =====================================================================

        async function checkAPIHealth() {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const status = document.getElementById('apiStatus');
                
                if (response.ok) {
                    status.textContent = 'Online';
                    status.className = 'status-badge online';
                } else {
                    status.textContent = 'Error';
                    status.className = 'status-badge offline';
                }
            } catch (error) {
                document.getElementById('apiStatus').textContent = 'Offline';
                document.getElementById('apiStatus').className = 'status-badge offline';
                console.error('API Health Check Failed:', error);
            }
        }

        async function analyzeArticle() {
            const text = document.getElementById('articleText').value.trim();
            const method = getSelectedMethod();

            if (!text) {
                showError('Please enter article text to analyze');
                return;
            }

            showLoading(true);
            disableAnalyzeBtn(true);

            try {
                let endpoint = '';
                let payload = { text };

                switch (method) {
                    case 'keyword':
                        endpoint = '/keyword-detect';
                        break;
                    case 'llm':
                        endpoint = '/llm-detect';
                        break;
                    case 'hybrid':
                        endpoint = '/hybrid-detect';
                        break;
                }

                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.success) {
                    displayResults(data.result, method, data.model);
                } else {
                    showError(data.error || 'Analysis failed');
                }

            } catch (error) {
                showError(`Error: ${error.message}. Make sure the API server is running on localhost:5000`);
            } finally {
                showLoading(false);
                disableAnalyzeBtn(false);
            }
        }

        // =====================================================================
        // Display Functions
        // =====================================================================

        function displayResults(result, method, model = null) {
            const resultsDiv = document.getElementById('results');
            const placeholder = document.getElementById('resultsPlaceholder');

            let html = '';

            // Fake Probability Bar
            const probability = result.fake_probability || 0;
            const verdictClass = probability < 30 ? 'credible' : probability < 60 ? 'questionable' : 'fake';
            
            html += `
                <div class="probability-bar">
                    <div class="probability-fill" style="width: ${probability}%;">
                        ${probability.toFixed(1)}%
                    </div>
                </div>
                <div class="verdict ${verdictClass}">
                    📌 ${result.verdict || 'Analysis Complete'}
                </div>
            `;

            // HYBRID METHOD: Show detailed score comparison
            if (method === 'hybrid' && result.keyword_analysis && result.llm_analysis) {
                html += displayHybridComparison(result);
            }

            // Red Flags
            if (result.red_flags && result.red_flags.length > 0) {
                html += '<div class="red-flags">';
                html += '<h3>⚠️ Red Flags Detected:</h3>';
                result.red_flags.forEach(flag => {
                    html += `<div class="red-flag-item">• ${flag}</div>`;
                });
                html += '</div>';
            }

            // Analysis Details
            if (result.analysis) {
                html += '<div class="analysis-section">';
                html += '<h3>📈 Keyword Analysis Breakdown</h3>';
                
                const analysisData = result.analysis;
                for (const [key, value] of Object.entries(analysisData)) {
                    const label = key.replace(/_/g, ' ').toUpperCase();
                    html += `
                        <div class="analysis-item">
                            <span class="analysis-label">${label}</span>
                            <span class="analysis-value">${value}</span>
                        </div>
                    `;
                }
                
                html += '</div>';
            }

            // LLM Results (if hybrid or llm method)
            if (result.llm_analysis && result.llm_analysis.fake_probability !== undefined && !result.llm_analysis.error) {
                html += '<div class="analysis-section">';
                html += '<h3>🤖 LLM Analysis Results</h3>';
                html += `<div class="analysis-item">
                    <span class="analysis-label">LLM Probability</span>
                    <span class="analysis-value">${result.llm_analysis.fake_probability}%</span>
                </div>`;
                
                if (result.llm_analysis.reasoning) {
                    html += `<div style="margin-top: 10px; padding: 10px; background: white; border-left: 3px solid #667eea;">
                        <strong>Reasoning:</strong> ${result.llm_analysis.reasoning}
                    </div>`;
                }
                
                html += '</div>';
            }

            // Method Used
            html += `<div class="analysis-section">
                <h3>⚙️ Analysis Method</h3>
                <div class="analysis-item">
                    <span class="analysis-label">Method</span>
                    <span class="analysis-value">${method.toUpperCase()}</span>
                </div>
                ${model ? `<div class="analysis-item">
                    <span class="analysis-label">Model</span>
                    <span class="analysis-value">${model}</span>
                </div>` : ''}
            </div>`;

            resultsDiv.innerHTML = html;
            resultsDiv.classList.remove('result-hidden');
            placeholder.style.display = 'none';
        }

        function displayHybridComparison(result) {
            const keywordScore = result.keyword_analysis.fake_probability;
            const llmScore = result.llm_analysis.fake_probability || 50; // fallback to 50 if not available
            const combinedScore = result.fake_probability;

            let html = '<div class="score-comparison">';

            // Keyword Score Card
            html += `
                <div class="score-card keyword">
                    <h4>🔑 Keyword Score</h4>
                    <div class="score-value">${keywordScore.toFixed(1)}%</div>
                    <div class="score-label">Keyword-based Analysis</div>
                    <div class="weight-indicator">Weight: 40%</div>
                </div>
            `;

            // LLM Score Card
            html += `
                <div class="score-card llm">
                    <h4>🤖 LLM Score</h4>
                    <div class="score-value">${llmScore.toFixed(1)}%</div>
                    <div class="score-label">Semantic Analysis</div>
                    <div class="weight-indicator">Weight: 60%</div>
                </div>
            `;

            // Combined Score Card
            html += `
                <div class="score-card combined">
                    <h4>⚡ Combined Score</h4>
                    <div class="score-value">${combinedScore.toFixed(1)}%</div>
                    <div class="score-label">Final Result</div>
                    <div class="weight-indicator">Weighted Average</div>
                </div>
            `;

            html += '</div>';

            // Calculation Breakdown
            html += `
                <div class="calculation-breakdown">
                    <h4>📊 Calculation Breakdown</h4>
                    <div class="calculation-step">
                        Final Score = (Keyword × 0.4) + (LLM × 0.6)
                    </div>
                    <div class="calculation-step">
                        Final Score = (${keywordScore.toFixed(1)} × 0.4) + (${llmScore.toFixed(1)} × 0.6)
                    </div>
                    <div class="calculation-step">
                        Final Score = ${(keywordScore * 0.4).toFixed(2)} + ${(llmScore * 0.6).toFixed(2)}
                    </div>
                    <div class="calculation-step" style="font-weight: bold; color: #667eea; margin-top: 10px;">
                        Final Score = ${combinedScore.toFixed(1)}%
                    </div>
                </div>
            `;

            // Detailed Comparison Table
            html += '<div class="detailed-comparison">';
            html += '<h4 style="padding: 15px 15px 0 15px; color: #667eea;">📋 Detailed Score Comparison</h4>';
            html += '<table class="comparison-table">';
            html += '<thead><tr>';
            html += '<th>Metric</th>';
            html += '<th style="text-align: center;">🔑 Keyword</th>';
            html += '<th style="text-align: center;">🤖 LLM</th>';
            html += '<th style="text-align: center;">Difference</th>';
            html += '</tr></thead><tbody>';

            // Score Difference
            const scoreDiff = Math.abs(keywordScore - llmScore).toFixed(1);
            const scoreMatch = scoreDiff <= 10 ? '✅ Good agreement' : scoreDiff <= 20 ? '⚠️ Moderate difference' : '❌ Significant difference';
            
            html += `
                <tr>
                    <td class="metric-name">Fake Probability Score</td>
                    <td class="metric-keyword">${keywordScore.toFixed(1)}%</td>
                    <td class="metric-llm">${llmScore.toFixed(1)}%</td>
                    <td style="text-align: center;"><strong>${scoreMatch}</strong> (${scoreDiff}%)</td>
                </tr>
            `;

            // Keyword Analysis Details
            if (result.keyword_analysis.analysis) {
                const kAnalysis = result.keyword_analysis.analysis;
                const metrics = [
                    ['Sensational Keywords', kAnalysis.sensational_keywords, '—'],
                    ['Emotional Keywords', kAnalysis.emotional_keywords, '—'],
                    ['Absolutist Keywords', kAnalysis.absolutist_keywords, '—'],
                    ['Credibility Markers', kAnalysis.credibility_markers, '—'],
                    ['Vague Attribution', kAnalysis.vague_attribution, '—'],
                    ['Clickbait Patterns', kAnalysis.clickbait_patterns, '—'],
                    ['Word Count', kAnalysis.word_count, '—'],
                ];

                metrics.forEach(([name, kwVal, llmVal]) => {
                    html += `
                        <tr>
                            <td class="metric-name">${name}</td>
                            <td class="metric-keyword">${kwVal}</td>
                            <td class="metric-llm">N/A</td>
                            <td style="text-align: center;">—</td>
                        </tr>
                    `;
                });
            }

            // Red Flags Comparison
            const kwRedFlags = result.keyword_analysis.red_flags ? result.keyword_analysis.red_flags.length : 0;
            const llmRedFlags = result.llm_analysis.red_flags ? result.llm_analysis.red_flags.length : 0;

            html += `
                <tr>
                    <td class="metric-name">Red Flags Detected</td>
                    <td class="metric-keyword">${kwRedFlags}</td>
                    <td class="metric-llm">${llmRedFlags}</td>
                    <td style="text-align: center;">${Math.abs(kwRedFlags - llmRedFlags)}</td>
                </tr>
            `;

            html += '</tbody></table></div>';

            // Analysis Recommendations
            if (scoreDiff > 20) {
                html += `
                    <div style="background: #fff3cd; border-left: 4px solid #ff9800; padding: 15px; margin-top: 15px; border-radius: 5px;">
                        <strong>⚠️ Note:</strong> Keyword and LLM scores differ significantly (${scoreDiff}%). 
                        This suggests the article has complex misinformation patterns that benefit from semantic analysis. 
                        The hybrid score of <strong>${combinedScore.toFixed(1)}%</strong> weights both approaches for a balanced assessment.
                    </div>
                `;
            } else {
                html += `
                    <div style="background: #e8f5e9; border-left: 4px solid #4caf50; padding: 15px; margin-top: 15px; border-radius: 5px;">
                        <strong>✅ Consistency:</strong> Keyword and LLM scores are in good agreement (${scoreDiff}% difference). 
                        This strengthens confidence in the final verdict of <strong>${result.verdict}</strong>.
                    </div>
                `;
            }

            return html;
        }

        function showError(message) {
            const resultsDiv = document.getElementById('results');
            const placeholder = document.getElementById('resultsPlaceholder');
            
            resultsDiv.innerHTML = `<div class="error">❌ ${message}</div>`;
            resultsDiv.classList.remove('result-hidden');
            placeholder.style.display = 'none';
        }

        // =====================================================================
        // Initialization
        // =====================================================================

        document.addEventListener('DOMContentLoaded', function() {
            checkAPIHealth();
            // Check API health every 30 seconds
            setInterval(checkAPIHealth, 30000);
        });

        // Allow Enter key to trigger analysis
        document.getElementById('articleText').addEventListener('keydown', function(event) {
            if (event.ctrlKey && event.key === 'Enter') {
                analyzeArticle();
            }
        });
    </script>
</body>
</html>
